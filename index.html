<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 768, H = 480, TILE = 32, GRAVITY = 0.6, FRICTION = 0.85;

// ==================== AUDIO ====================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx, bgmStarted = false, bgmInterval = null;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); if (audioCtx.state === 'suspended') audioCtx.resume(); }

function playFart() {
  ensureAudio();
  const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
  const lfo = audioCtx.createOscillator(), lfoG = audioCtx.createGain();
  lfo.frequency.value = 15 + Math.random() * 10; lfoG.gain.value = 60;
  lfo.connect(lfoG); lfoG.connect(osc.frequency);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(80 + Math.random() * 30, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.25);
  gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
  const bufSize = audioCtx.sampleRate * 0.3, buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0); for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
  const noise = audioCtx.createBufferSource(); noise.buffer = buf;
  const nG = audioCtx.createGain(); nG.gain.setValueAtTime(0.15, audioCtx.currentTime);
  nG.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
  const nF = audioCtx.createBiquadFilter(); nF.type = 'lowpass'; nF.frequency.value = 500;
  noise.connect(nF); nF.connect(nG); nG.connect(audioCtx.destination);
  osc.connect(gain); gain.connect(audioCtx.destination);
  lfo.start(); osc.start(); noise.start();
  osc.stop(audioCtx.currentTime + 0.35); lfo.stop(audioCtx.currentTime + 0.35); noise.stop(audioCtx.currentTime + 0.3);
}
function playCoin() {
  ensureAudio(); const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = 'square';
  o.frequency.setValueAtTime(988, audioCtx.currentTime); o.frequency.setValueAtTime(1319, audioCtx.currentTime + 0.07);
  g.gain.setValueAtTime(0.15, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
  o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.2);
}
function playStomp() {
  ensureAudio(); const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = 'square';

  g.gain.setValueAtTime(0.2, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.15);
}
function playDeath() {
  ensureAudio(); stopBGM();
  [523,493,440,349,330,294,261,220].forEach((f, i) => {

    o.connect(g); g.connect(audioCtx.destination);
    o.start(audioCtx.currentTime + i * 0.12); o.stop(audioCtx.currentTime + i * 0.12 + 0.12);

}
function playPowerUp() {
  ensureAudio();

    const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = 'square'; o.frequency.value = f;
    g.gain.setValueAtTime(0.12, audioCtx.currentTime + i * 0.06);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.06 + 0.08);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(audioCtx.currentTime + i * 0.06); o.stop(audioCtx.currentTime + i * 0.06 + 0.09);
  });
}
function playPipe() {
  ensureAudio(); const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = 'square';
  o.frequency.setValueAtTime(600, audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.3);
  g.gain.setValueAtTime(0.15, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
  o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.3);
}
function playWinFanfare() {
  ensureAudio(); stopBGM();
  const m = [[523,.15],[523,.15],[523,.15],[0,.05],[523,.3],[415,.15],[466,.15],[523,.2],[0,.05],[466,.1],[523,.5],
    [659,.15],[659,.15],[659,.15],[0,.05],[659,.3],[523,.15],[587,.15],[659,.2],[0,.05],[587,.1],[659,.5],[784,.6]];
  let t = audioCtx.currentTime + 0.3;
  m.forEach(([f, d]) => { if (f > 0) { const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = 'square'; o.frequency.value = f;
    g.gain.setValueAtTime(0.12, t); g.gain.setValueAtTime(0.12, t + d - 0.02); g.gain.exponentialRampToValueAtTime(0.001, t + d);
    o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t + d); } t += d; });
}

function startBGM() {
  if (bgmStarted) return; ensureAudio(); bgmStarted = true;
  const melA=[659,659,0,659,0,523,659,0,784,0,0,0,392,0,0,0,523,0,0,392,0,0,330,0,0,440,0,494,0,466,440,0,
    392,659,784,880,0,698,784,0,659,0,523,587,494,0,0,0,523,0,0,392,0,0,330,0,0,440,0,494,0,466,440,0,
    392,659,784,880,0,698,784,0,659,0,523,587,494,0,0,0];
  const bassA=[131,0,131,0,131,0,131,0,165,0,0,0,98,0,0,0,131,0,0,98,0,0,110,0,0,147,0,165,0,156,147,0,
    98,175,196,220,0,175,196,0,165,0,131,147,123,0,0,0,131,0,0,98,0,0,110,0,0,147,0,165,0,156,147,0,
    98,175,196,220,0,175,196,0,165,0,131,147,123,0,0,0];
  const melB=[330,349,392,0,440,0,392,349,330,0,294,330,349,0,0,0,262,294,330,349,392,440,494,523,587,523,494,440,392,0,0,0,
    659,622,587,0,523,0,494,440,392,0,440,494,523,0,0,0,587,523,494,0,440,392,349,330,294,262,294,330,349,0,0,0];
  const bassB=[110,0,110,0,131,0,131,0,110,0,98,0,110,0,0,0,87,0,87,0,110,0,110,0,131,0,131,0,110,0,0,0,
    165,0,165,0,131,0,131,0,110,0,110,0,131,0,0,0,147,0,131,0,110,0,98,0,87,0,87,0,110,0,0,0];
  const melC=[784,784,784,0,659,784,0,880,0,784,0,659,0,587,523,0,784,784,784,0,880,784,659,0,523,0,587,0,659,0,0,0,
    880,880,880,0,784,659,0,784,0,880,988,0,880,784,659,0,523,587,659,784,880,784,659,523,440,392,440,523,659,0,0,0];
  const bassC=[196,0,196,0,165,0,196,0,220,0,196,0,165,0,131,0,196,0,196,0,220,0,196,165,131,0,147,0,165,0,0,0,
    220,0,220,0,196,165,0,196,0,220,247,0,220,196,165,0,131,147,165,196,220,196,165,131,110,98,110,131,165,0,0,0];
  const melD=[330,0,392,0,440,0,494,0,523,0,494,0,440,0,392,0,349,0,392,0,440,0,523,0,587,0,523,0,440,0,0,0,
    262,0,330,0,392,0,440,0,523,587,659,0,587,523,440,0,392,0,349,0,330,0,294,0,262,0,0,0,330,0,0,0];
  const bassD=[110,0,110,0,131,0,131,0,165,0,131,0,131,0,110,0,98,0,98,0,110,0,131,0,147,0,131,0,110,0,0,0,
    87,0,110,0,131,0,147,0,165,147,165,0,147,131,110,0,131,0,110,0,98,0,87,0,82,0,0,0,110,0,0,0];
  const fM=[...melA,...melB,...melC,...melD,...melA,...melC], fB=[...bassA,...bassB,...bassC,...bassD,...bassA,...bassC];
  const drumP=[1,0,0,0,2,0,0,0,1,0,1,0,2,0,0,0];
  let step = 0; const bpm = 240, st = 60 / bpm / 2;
  function ps() {
    if (!audioCtx || audioCtx.state === 'closed') return;
    const t = audioCtx.currentTime, idx = step % fM.length, mf = fM[idx], bf = fB[idx], dr = drumP[step % 16];
    if (bf > 0) { const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = 'triangle'; o.frequency.value = bf;
      g.gain.setValueAtTime(0.07, t); g.gain.exponentialRampToValueAtTime(0.001, t + st * 0.85);
      o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t + st); }
    if (mf > 0 && step % 2 === 0) { const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = 'square'; o.frequency.value = mf;
      g.gain.setValueAtTime(0.055, t); g.gain.exponentialRampToValueAtTime(0.001, t + st * 1.7);
      o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t + st * 2); }
    if (dr > 0) { const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = 'triangle';
      o.frequency.setValueAtTime(dr===1?80:200, t); o.frequency.exponentialRampToValueAtTime(30, t + (dr===1?.08:.12));
      g.gain.setValueAtTime(0.1, t); g.gain.exponentialRampToValueAtTime(0.001, t + (dr===1?.08:.12));
      o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t + 0.12);
      if (dr === 2) { const nb = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.08, audioCtx.sampleRate);
        const nd = nb.getChannelData(0); for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
        const ns = audioCtx.createBufferSource(); ns.buffer = nb; const ng = audioCtx.createGain();
        ng.gain.setValueAtTime(0.06, t); ng.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
        ns.connect(ng); ng.connect(audioCtx.destination); ns.start(t); ns.stop(t + 0.08); } }
    step++;
  }
  bgmInterval = setInterval(ps, st * 1000); ps();
}
function stopBGM() { if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; } bgmStarted = false; }

// ==================== GAME STATE ====================
let gameStarted = false, gameOver = false, gameWon = false, winTimer = 0;
let shavingPhase = 0, shavingProgress = 0;
let score = 0, coins = 0, timeLeft = 400, cameraX = 0, frameCount = 0;
let currentLevel = 1;
let levelTransition = 0; // >0 means transitioning
let levelTransitionTarget = 0;

const LEVEL_WIDTH = 212, LEVEL_HEIGHT = 15;
const level = [];
let questionBlocks = {}, mushrooms = [], particles = [], enemies = [];

const player = { x:3*TILE, y:11*TILE, w:24, h:32, vx:0, vy:0, onGround:false, facing:1, frame:0, frameTimer:0, big:false, dead:false, invincible:0 };

// ==================== KEYS ====================
const keys = {};
let timeInterval;
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Enter' && !gameStarted) {
    gameStarted = true; document.getElementById('startScreen').style.display = 'none';
    timeInterval = setInterval(() => { if (timeLeft > 0 && !gameOver && !gameWon && levelTransition <= 0) timeLeft--; }, 1000);
    startBGM();
  }
  if (e.code === 'Enter' && gameOver) location.reload();
  if (e.code === 'Enter' && gameWon && shavingPhase >= 3) location.reload();
  // Debug: Ctrl+1/2/3 switch levels
  if (e.ctrlKey && (e.code === 'Digit1' || e.code === 'Digit2' || e.code === 'Digit3') && gameStarted) {
    e.preventDefault();
    const lvl = parseInt(e.code.slice(-1));
    if (lvl !== currentLevel) startLevel(lvl);
  }
});
document.addEventListener('keyup', e => keys[e.code] = false);

// ==================== LEVEL THEMES ====================
const THEMES = {
  1: { // Overworld - purple night
    sky1: '#1a0a2e', sky2: '#2d1b4e', sky3: '#4a2d70',
    ground: '#6b3fa0', groundDark: '#4a2d70', brick: '#8b5fbf', brickDark: '#6b3fa0',
    pipe: '#7b2fbe', pipeDark: '#5a1f8e', pipeLight: '#a855f7',
    hill: '#7c3aed', hillL: '#a78bfa', bush: '#6d28d9', bushL: '#8b5cf6',
    cloud: '#d8b4fe', cloudL: '#c084fc', star: '#d8b4fe',
    hardBlock: '#5b3a80', hardBlockL: '#7b5aa0',
    name: 'МИР 1-1',
  },
  2: { // Underground - deep dark cave
    sky1: '#0a0a1a', sky2: '#111128', sky3: '#1a1a3a',

    hardBlock: '#3a3a5c', hardBlockL: '#5a5a7c',

  },

  }
};
let theme = THEMES[1];

// ==================== LEVEL BUILDER ====================
function clearLevel() {
  for (let y = 0; y < LEVEL_HEIGHT; y++) { level[y] = []; for (let x = 0; x < LEVEL_WIDTH; x++) level[y][x] = 0; }
  questionBlocks = {}; mushrooms = []; particles = []; enemies = [];
}

function setB(x, y, t) { if (x >= 0 && x < LEVEL_WIDTH && y >= 0 && y < LEVEL_HEIGHT) level[y][x] = t; }
function placePipe(x, topY) { for (let y = topY; y < 13; y++) { level[y][x] = 4; level[y][x+1] = 4; } }
function placeStair(startX, dir, height) {
  for (let i = 0; i < height; i++) for (let j = 0; j <= i; j++)
    setB(dir > 0 ? startX + i : startX - i, 12 - j, 5);
}
function buildCastle(sx, ty) {
  for (let y = ty; y <= 12; y++) for (let x = sx; x < sx + 5; x++) level[y][x] = 7;
  setB(sx, ty-1, 7); setB(sx+2, ty-1, 7); setB(sx+4, ty-1, 7);
  level[11][sx+2] = 0; level[12][sx+2] = 0;
}
function placeFlag(x) { for (let y = 3; y <= 12; y++) level[y][x] = 6; }

function buildLevel1() {
  // Ground with gaps
  for (let x = 0; x < LEVEL_WIDTH; x++) {
    if ((x >= 69 && x <= 70) || (x >= 86 && x <= 88)) continue;
    level[13][x] = 1; level[14][x] = 1;

    {x:40*TILE,y:12*TILE,w:TILE,h:TILE,vx:-1,type:'goomba',alive:true,frame:0},

function buildLevel2() {
  // Underground: full ceiling, tricky platforming, lava pits, hidden rooms
  // Full ground
  for (let x = 0; x < 180; x++) {
    if ((x >= 35 && x <= 37) || (x >= 55 && x <= 56) || (x >= 78 && x <= 81) || (x >= 105 && x <= 107)) continue;
    level[13][x] = 1; level[14][x] = 1;
  }
  // Ceiling
  for (let x = 0; x < 170; x++) { level[0][x] = 1; level[1][x] = 1; }
  // Lava at bottom of pits (type 9 = lava)
  for (let gap of [[35,37],[55,56],[78,81],[105,107]])
    for (let x = gap[0]; x <= gap[1]; x++) { level[13][x] = 9; level[14][x] = 9; }

  // Low ceiling corridors
  for (let x = 15; x < 30; x++) { setB(x, 5, 2); }
  // ? blocks in corridor
  setB(18, 4, 8); setB(22, 4, 3); setB(26, 4, 3);

  // Platforms over first pit
  setB(34, 10, 5); setB(35, 8, 5); setB(36, 10, 5); setB(38, 10, 5);

  // Coin room section (dense ? blocks)
  for (let x = 42; x <= 50; x++) setB(x, 9, x % 3 === 0 ? 8 : 3);
  for (let x = 42; x <= 50; x++) setB(x, 5, 2);

  // Moving platform section (blocks forming stepping stones)
  setB(58, 11, 5); setB(60, 9, 5); setB(62, 7, 5); setB(64, 9, 5); setB(66, 11, 5);

  // Long brick bridge over big lava pit
  for (let x = 70; x <= 77; x++) setB(x, 9, 2);
  setB(73, 9, 8); setB(75, 9, 3);
  // Platforms after big pit
  setB(82, 11, 5); setB(84, 9, 5); setB(86, 11, 5);

  // Pipe maze section
  placePipe(90, 10); placePipe(94, 8); placePipe(98, 10);
  setB(92, 7, 8); setB(96, 6, 3);

  // Dense enemy corridor
  for (let x = 110; x < 130; x++) setB(x, 5, x % 7 === 0 ? 8 : 2);
  // Staircase to exit
  placeStair(135, 1, 6);

// ==================== BACKGROUND ====================
let clouds = [], hills = [], bushes = [];
function generateBG() {
  clouds = []; hills = []; bushes = [];
  for (let i = 0; i < 30; i++) clouds.push({ x: i*300+Math.random()*200, y: 30+Math.random()*80 });
  for (let i = 0; i < 20; i++) hills.push({ x: i*400+Math.random()*200, w: 120+Math.random()*80, h: 60+Math.random()*40 });
  for (let i = 0; i < 25; i++) bushes.push({ x: i*280+Math.random()*140, w: 50+Math.random()*40 });
}

function drawBackground() {
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, theme.sky1); g.addColorStop(0.5, theme.sky2); g.addColorStop(1, theme.sky3);
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  // Stars
  ctx.fillStyle = theme.star;
  for (let i = 0; i < 40; i++) {
    const sx = ((i*137+50)%(W+200))-(cameraX*0.1%(W+200)), sy = (i*73+20)%150;
    ctx.globalAlpha = (Math.sin(frameCount*0.05+i)*0.5+0.5)*0.7; ctx.fillRect(sx,sy,2,2);
  }
  ctx.globalAlpha = 1;
  for (const h of hills) {
    const sx = h.x - cameraX*0.3; if (sx < -200 || sx > W+200) continue;
    ctx.fillStyle = theme.hill; ctx.beginPath(); ctx.moveTo(sx, 13*TILE);
    ctx.quadraticCurveTo(sx+h.w/2, 13*TILE-h.h, sx+h.w, 13*TILE); ctx.fill();
    ctx.fillStyle = theme.hillL; ctx.beginPath(); ctx.moveTo(sx+20, 13*TILE);
    ctx.quadraticCurveTo(sx+h.w/2, 13*TILE-h.h+15, sx+h.w-20, 13*TILE); ctx.fill();
  }
  for (const c of clouds) {
    const sx = c.x - cameraX*0.2; if (sx < -100 || sx > W+100) continue;
    ctx.fillStyle = theme.cloud; ctx.beginPath();
    ctx.arc(sx,c.y,20,0,Math.PI*2); ctx.arc(sx+25,c.y-8,24,0,Math.PI*2);
    ctx.arc(sx+50,c.y,20,0,Math.PI*2); ctx.arc(sx+25,c.y+5,22,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = theme.cloudL; ctx.beginPath(); ctx.arc(sx+25,c.y-5,18,0,Math.PI*2); ctx.fill();
  }
  for (const b of bushes) {
    const sx = b.x - cameraX*0.5; if (sx < -100 || sx > W+100) continue;
    const by = 13*TILE-8;
    ctx.fillStyle = theme.bush; ctx.beginPath();
    ctx.arc(sx,by,16,0,Math.PI*2); ctx.arc(sx+20,by-4,20,0,Math.PI*2); ctx.arc(sx+40,by,16,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = theme.bushL; ctx.beginPath(); ctx.arc(sx+20,by-8,14,0,Math.PI*2); ctx.fill();
  }
}

// ==================== COLLISION ====================
function getBlockKey(x,y) { return `${x},${y}`; }
function isQuestionHit(x,y) { return questionBlocks[getBlockKey(x,y)]; }
function hitQuestion(x,y) {
  const key = getBlockKey(x,y); if (questionBlocks[key]) return;
  questionBlocks[key] = true; const bt = level[y][x];
  if (bt === 8) {
    mushrooms.push({x:x*TILE,y:y*TILE-TILE,w:TILE,h:TILE,vx:2,vy:0,alive:true});
    level[y][x] = 3; score += 100;
  } else { coins++; score += 200; particles.push({x:x*TILE+16,y:y*TILE,vx:0,vy:-8,life:30,type:'coin'}); playCoin(); }
}

function isSolid(tx,ty) {
  if (tx<0||tx>=LEVEL_WIDTH||ty<0||ty>=LEVEL_HEIGHT) return false;
  const t = level[ty][tx]; return t===1||t===2||t===3||t===4||t===5||t===7||t===8;
}
function isLava(tx,ty) { return tx>=0&&tx<LEVEL_WIDTH&&ty>=0&&ty<LEVEL_HEIGHT&&level[ty][tx]===9; }

function collideX() {
  const top=Math.floor(player.y/TILE), bot=Math.floor((player.y+player.h-1)/TILE);
  if (player.vx > 0) { const tx=Math.floor((player.x+player.w)/TILE);
    for (let ty=top;ty<=bot;ty++) if(isSolid(tx,ty)){player.x=tx*TILE-player.w;player.vx=0;break;} }
  else if (player.vx < 0) { const tx=Math.floor(player.x/TILE);
    for (let ty=top;ty<=bot;ty++) if(isSolid(tx,ty)){player.x=(tx+1)*TILE;player.vx=0;break;} }
}
function collideY() {
  if (player.vy > 0) {
    const ty=Math.floor((player.y+player.h)/TILE), lT=Math.floor(player.x/TILE), rT=Math.floor((player.x+player.w-1)/TILE);
    for (let tx=lT;tx<=rT;tx++) {
      if (isLava(tx,ty)) { player.dead = true; return; }
      if(isSolid(tx,ty)){player.y=ty*TILE-player.h;player.vy=0;player.onGround=true;break;}
    }
  } else if (player.vy < 0) {
    const ty=Math.floor(player.y/TILE), lT=Math.floor((player.x+4)/TILE), rT=Math.floor((player.x+player.w-5)/TILE);
    for (let tx=lT;tx<=rT;tx++) if(isSolid(tx,ty)){
      player.y=(ty+1)*TILE; player.vy=0;
      const bt=level[ty][tx];
      if((bt===3||bt===8)&&!isQuestionHit(tx,ty)) hitQuestion(tx,ty);
      else if(bt===2){level[ty][tx]=0; particles.push(...brickP(tx*TILE,ty*TILE)); score+=50;}
      break;
    }
  }
  if (player.y > H+50) player.dead = true;
}

function brickP(x,y) {
  const p=[]; for(let i=0;i<4;i++) p.push({x:x+(i%2)*16,y:y+Math.floor(i/2)*16,
    vx:(i%2===0?-2:2)+Math.random()*2,vy:-5-Math.random()*3,life:40,type:'brick',size:12}); return p;
}
function scoreP(x,y,t) { particles.push({x,y,vx:0,vy:-2,life:30,type:'score',text:t}); }

// ==================== UPDATE ====================
function update() {
  if (!gameStarted || gameOver) return;
  if (levelTransition > 0) { levelTransition--; if (levelTransition === 0) startLevel(levelTransitionTarget); return; }
  if (gameWon) {
    winTimer++; frameCount++;
    if (currentLevel < 3 && shavingPhase === 0) {
      // Next level transition (not last level = no shaving)
      if (winTimer > 90) { levelTransition = 60; levelTransitionTarget = currentLevel + 1; shavingPhase = -1; }
    } else if (currentLevel === 3) {
      if (shavingPhase === 0 && winTimer > 60) { shavingPhase = 2; shavingProgress = 0; }
      if (shavingPhase === 2) { shavingProgress += 0.4; if (shavingProgress >= 100) shavingPhase = 3; }
    }
    return;
  }
  if (player.dead) { if (!gameOver) playDeath(); gameOver = true; return; }
  frameCount++;

  const running = keys['KeyX']||keys['ShiftLeft'];
  const maxSpd = running ? 5 : 3, acc = player.onGround ? 0.4 : 0.2;
  if (keys['ArrowRight']) { player.vx+=acc; if(player.vx>maxSpd)player.vx=maxSpd; player.facing=1; }
  else if (keys['ArrowLeft']) { player.vx-=acc; if(player.vx<-maxSpd)player.vx=-maxSpd; player.facing=-1; }
  else if (player.onGround) { player.vx*=FRICTION; if(Math.abs(player.vx)<0.1)player.vx=0; }

  if ((keys['KeyZ']||keys['Space']) && player.onGround) {
    player.vy = player.big ? -13.5 : -11; player.onGround = false; playFart();
  }
  player.vy += GRAVITY; if(player.vy>12)player.vy=12;
  if(!(keys['KeyZ']||keys['Space'])&&player.vy<-3) player.vy=-3;

  player.x += player.vx;
  if (player.x < cameraX) { player.x = cameraX; player.vx = 0; }
  collideX();
  player.y += player.vy; player.onGround = false; collideY();

  if (Math.abs(player.vx)>0.5&&player.onGround) { player.frameTimer++;
    if(player.frameTimer>6){player.frame=(player.frame+1)%3;player.frameTimer=0;} }
  else if(player.onGround){player.frame=0;player.frameTimer=0;}

  const tc=player.x-W/3; if(tc>cameraX)cameraX=tc; if(cameraX<0)cameraX=0;
  if(player.invincible>0) player.invincible--;

  // Mushrooms
  for (const m of mushrooms) {
    if(!m.alive) continue; m.x+=m.vx; m.vy+=0.5; if(m.vy>8)m.vy=8; m.y+=m.vy;
    const mTY=Math.floor((m.y+m.h)/TILE), mTX=Math.floor((m.x+m.w/2)/TILE);
    if(isSolid(mTX,mTY)){m.y=mTY*TILE-m.h;m.vy=0;}
    const wTX=Math.floor((m.x+(m.vx>0?m.w:0))/TILE), wTY=Math.floor((m.y+m.h/2)/TILE);
    if(isSolid(wTX,wTY)) m.vx*=-1;
    if(m.y>H+50) m.alive=false;
    if(player.x<m.x+m.w&&player.x+player.w>m.x&&player.y<m.y+m.h&&player.y+player.h>m.y){
      m.alive=false; score+=1000;
      if(!player.big){player.big=true;player.h=52;player.y-=20;scoreP(m.x,m.y,'РОСТ!');playPowerUp();}
      else{scoreP(m.x,m.y,'1UP!');playCoin();}
    }
  }

  // Enemies
  for (const e of enemies) {
    if(!e.alive) continue; if(e.x<cameraX-100||e.x>cameraX+W+200) continue;
    e.x+=e.vx; e.frame+=0.05;
    const bTY=Math.floor((e.y+e.h)/TILE), eTX=Math.floor((e.x+e.w/2)/TILE);
    if(!isSolid(eTX,bTY)) e.y+=3; else e.y=bTY*TILE-e.h;
    const wTX=Math.floor((e.x+(e.vx>0?e.w:0))/TILE), wTY=Math.floor((e.y+e.h/2)/TILE);
    if(isSolid(wTX,wTY)) e.vx*=-1;
    if(player.invincible<=0&&!player.dead){
      if(player.x<e.x+e.w&&player.x+player.w>e.x&&player.y<e.y+e.h&&player.y+player.h>e.y){
        if(player.vy>0&&player.y+player.h-e.y<16){e.alive=false;player.vy=-8;score+=100;scoreP(e.x,e.y,'100');playStomp();}
        else if(player.big){player.big=false;player.h=32;player.invincible=90;playPipe();}
        else{player.dead=true;}
      }
    }
    if(e.y>H+50) e.alive=false;
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;
    if(p.type==='brick'||p.type==='coin')p.vy+=0.4;p.life--;if(p.life<=0)particles.splice(i,1);}

  // Flag check
  const pTX=Math.floor((player.x+player.w/2)/TILE), pTY=Math.floor((player.y+player.h/2)/TILE);
  if(level[pTY]&&level[pTY][pTX]===6){gameWon=true;winTimer=0;shavingPhase=0;score+=timeLeft*50;playWinFanfare();}
  if(timeLeft<=0&&!gameWon) player.dead=true;

  document.getElementById('scoreDisplay').textContent = String(score).padStart(6,'0');
  document.getElementById('coinDisplay').textContent = coins;
  document.getElementById('timeDisplay').textContent = timeLeft;
}

  ctx.fillStyle='#7c3aed';ctx.fillRect(sx+4,sy+12,24,20);ctx.fillStyle='#6d28d9';ctx.fillRect(sx+8,sy+14,16,16);
  ctx.fillStyle='#a78bfa';ctx.fillRect(sx+10,sy+16,4,8);ctx.fillStyle='#86b049';
  ctx.fillRect(sx+(e.vx<0?0:20),sy+4,12,14);ctx.fillStyle='#fff';ctx.fillRect(sx+(e.vx<0?2:24),sy+6,6,6);
  ctx.fillStyle='#000';ctx.fillRect(sx+(e.vx<0?3:26),sy+8,3,3);const w=Math.sin(e.frame*4)*2;
  ctx.fillStyle='#f5d0a9';ctx.fillRect(sx+4,sy+32+w,8,6);ctx.fillRect(sx+20,sy+32-w,8,6);}
function drawMushroom(m){const sx=m.x-cameraX,sy=m.y;
  ctx.fillStyle='#ff69b4';ctx.beginPath();ctx.arc(sx+16,sy+10,14,Math.PI,0);ctx.fill();ctx.fillRect(sx+2,sy+10,28,4);
  ctx.fillStyle='#ffb6c1';ctx.beginPath();ctx.arc(sx+10,sy+5,4,0,Math.PI*2);ctx.arc(sx+22,sy+5,4,0,Math.PI*2);
  ctx.arc(sx+16,sy+1,3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff5ee';ctx.fillRect(sx+8,sy+14,16,14);
  ctx.fillStyle='#ffe4e1';ctx.fillRect(sx+10,sy+16,4,8);ctx.fillRect(sx+18,sy+18,4,6);
  ctx.fillStyle='#000';ctx.fillRect(sx+11,sy+18,3,4);ctx.fillRect(sx+18,sy+18,3,4);
  ctx.fillStyle='#fff';ctx.fillRect(sx+11,sy+18,2,2);ctx.fillRect(sx+18,sy+18,2,2);}

function drawTile(tx,ty) {
  const sx=tx*TILE-cameraX,sy=ty*TILE; if(sx<-TILE||sx>W+TILE)return;
  const t=level[ty][tx]; if(t===0)return;
  switch(t){
    case 1: ctx.fillStyle=theme.ground;ctx.fillRect(sx,sy,TILE,TILE);ctx.fillStyle=theme.groundDark;
      ctx.fillRect(sx,sy,TILE,4);ctx.strokeStyle=theme.groundDark;ctx.lineWidth=1;ctx.strokeRect(sx+.5,sy+.5,TILE-1,TILE-1);
      if(ty===13||ty===0){ctx.fillStyle=theme.groundDark;ctx.globalAlpha=0.3;ctx.fillRect(sx+2,sy+2,12,12);ctx.fillRect(sx+18,sy+18,12,12);ctx.globalAlpha=1;}break;
    case 2: ctx.fillStyle=theme.brick;ctx.fillRect(sx,sy,TILE,TILE);ctx.fillStyle=theme.brickDark;
      ctx.fillRect(sx,sy+15,TILE,2);ctx.fillRect(sx+15,sy,2,TILE);ctx.fillRect(sx,sy,TILE,2);ctx.fillRect(sx,sy,2,TILE);break;
    case 3: case 8: {const hit=isQuestionHit(tx,ty);
      if(hit){ctx.fillStyle='#4a3060';ctx.fillRect(sx,sy,TILE,TILE);ctx.fillStyle='#3a2050';ctx.fillRect(sx+4,sy+4,TILE-8,TILE-8);}
      else{const sh=Math.sin(frameCount*0.1)*20;ctx.fillStyle=`rgb(${212+sh},${160+sh},255)`;ctx.fillRect(sx,sy,TILE,TILE);
        ctx.fillStyle='#9b59b6';ctx.fillRect(sx,sy,TILE,3);ctx.fillRect(sx,sy,3,TILE);ctx.fillRect(sx,sy+TILE-3,TILE,3);ctx.fillRect(sx+TILE-3,sy,3,TILE);
        ctx.fillStyle='#4a0080';ctx.font='bold 18px monospace';ctx.fillText('?',sx+10,sy+23);}}break;
    case 4: ctx.fillStyle=theme.pipe;ctx.fillRect(sx,sy,TILE,TILE);ctx.fillStyle=theme.pipeLight;ctx.fillRect(sx+2,sy,8,TILE);
      ctx.fillStyle=theme.pipeDark;ctx.fillRect(sx+TILE-6,sy,6,TILE);
      if(ty>0&&level[ty-1][tx]!==4){ctx.fillStyle=theme.pipeDark;ctx.fillRect(sx-4,sy,TILE+8,8);ctx.fillStyle=theme.pipeLight;ctx.fillRect(sx-4,sy,TILE+8,4);}break;
    case 5: ctx.fillStyle=theme.hardBlock;ctx.fillRect(sx,sy,TILE,TILE);ctx.fillStyle=theme.hardBlockL;
      ctx.fillRect(sx+2,sy+2,TILE-4,TILE-4);ctx.fillStyle=theme.hardBlock;
      ctx.fillRect(sx+TILE-4,sy+4,2,TILE-4);ctx.fillRect(sx+4,sy+TILE-4,TILE-4,2);break;
    case 6: ctx.fillStyle='#c0c0c0';ctx.fillRect(sx+14,sy,4,TILE);
      if(ty===3){ctx.fillStyle='#d946ef';ctx.fillRect(sx-16,sy,30,18);ctx.fillStyle='#a21caf';ctx.font='bold 14px monospace';ctx.fillText('М',sx-8,sy+14);}break;
    case 7: ctx.fillStyle='#6b3fa0';ctx.fillRect(sx,sy,TILE,TILE);ctx.fillStyle='#5a2d90';
      ctx.fillRect(sx+2,sy+2,12,12);ctx.fillRect(sx+18,sy+2,12,12);ctx.fillRect(sx+2,sy+18,12,12);ctx.fillRect(sx+18,sy+18,12,12);break;
    case 9: // Lava
      ctx.fillStyle=`rgb(${200+Math.sin(frameCount*0.1+tx)*40},${50+Math.sin(frameCount*0.15+tx)*30},${80})`;
      ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle='#ff6600';ctx.globalAlpha=0.5+Math.sin(frameCount*0.2+tx*0.5)*0.3;
      ctx.fillRect(sx,sy,TILE,6);ctx.globalAlpha=1;break;
  }
}
function drawParticles(){for(const p of particles){
  if(p.type==='coin'){ctx.fillStyle='#ffd700';const cw=Math.abs(Math.sin(p.life*0.3))*8+2;ctx.fillRect(p.x-cameraX-cw/2,p.y,cw,12);}
  else if(p.type==='brick'){ctx.fillStyle=theme.brick;ctx.fillRect(p.x-cameraX,p.y,p.size,p.size);}
  else if(p.type==='score'){ctx.fillStyle='#fff';ctx.font='12px monospace';ctx.fillText(p.text,p.x-cameraX,p.y);}}}

function drawShavingCutscene() {
  ctx.fillStyle='rgba(26,10,46,0.92)';ctx.fillRect(0,0,W,H);
  const cx=W/2,cy=H/2-30; ctx.fillStyle='#ffd700';ctx.font='bold 22px monospace';ctx.textAlign='center';
  ctx.fillText('МАРИЯ БРЕЕТСЯ!',cx,50);
  const fx=cx-50,fy=cy-40;
  ctx.fillStyle='#9b59b6';ctx.fillRect(fx-20,fy-20,140,30);ctx.fillRect(fx-30,fy+10,30,90);ctx.fillRect(fx+100,fy+10,30,70);
  ctx.fillStyle='#f5d0a9';ctx.fillRect(fx,fy,100,80);
  const blink=Math.sin(frameCount*0.08)>0.95;
  if(blink){ctx.fillStyle='#2d1b4e';ctx.fillRect(fx+15,fy+25,25,3);ctx.fillRect(fx+60,fy+25,25,3);}
  else{ctx.fillStyle='#4a0080';ctx.fillRect(fx+15,fy+20,20,18);ctx.fillRect(fx+65,fy+20,20,18);
    ctx.fillStyle='#fff';ctx.fillRect(fx+15,fy+20,12,10);ctx.fillRect(fx+65,fy+20,12,10);
    ctx.fillStyle='#2d1b4e';ctx.fillRect(fx+12,fy+17,30,3);ctx.fillRect(fx+62,fy+17,30,3);}
  ctx.fillStyle='#e8a87c';ctx.fillRect(fx+80,fy+35,15,15);
  ctx.fillStyle='#e74c7c';ctx.fillRect(fx+30,fy+55,30,5);ctx.fillRect(fx+25,fy+52,5,5);ctx.fillRect(fx+60,fy+52,5,5);
  ctx.fillStyle='#ffd700';ctx.fillRect(fx-5,fy-15,110,15);ctx.fillRect(fx,fy-30,15,15);
  ctx.fillRect(fx+42,fy-35,20,20);ctx.fillRect(fx+90,fy-30,15,15);ctx.fillStyle='#d946ef';ctx.fillRect(fx+48,fy-25,8,8);
  const bL=Math.max(0,1-shavingProgress/100);
  if(bL>0.02){ctx.fillStyle='#5b3a29';const bH=60*bL;
    ctx.fillRect(fx+10,fy+60,80,Math.max(1,bH*0.4));if(bL>0.2)ctx.fillRect(fx+15,fy+60+bH*0.3,70,Math.max(1,bH*0.3));
    if(bL>0.4)ctx.fillRect(fx+20,fy+60+bH*0.5,60,Math.max(1,bH*0.3));if(bL>0.6)ctx.fillRect(fx+25,fy+60+bH*0.7,50,Math.max(1,bH*0.2));
    ctx.fillStyle='#7a5240';if(bL>0.3)for(let i=0;i<6;i++)ctx.fillRect(fx+20+i*12,fy+65,3,bH*0.5);}
  const rX=fx+90+Math.sin(frameCount*0.15)*15,rY=fy+55+Math.cos(frameCount*0.1)*10+shavingProgress/100*30;
  ctx.fillStyle='#c0c0c0';ctx.fillRect(rX+10,rY-30,8,35);ctx.fillStyle='#e0e0e0';ctx.fillRect(rX,rY-32,28,8);
  ctx.fillStyle='#87ceeb';ctx.fillRect(rX+2,rY-30,24,4);ctx.fillStyle='#9b59b6';ctx.fillRect(rX+8,rY-2,12,15);
  if(shavingProgress<95){ctx.fillStyle='#fff';for(let i=0;i<8;i++){const px=rX+Math.sin(frameCount*0.2+i*1.5)*20;
    const py=rY+10+i*5+Math.cos(frameCount*0.15+i)*5;ctx.beginPath();ctx.arc(px,py,3+Math.sin(frameCount*0.1+i)*2,0,Math.PI*2);ctx.fill();}}
  if(shavingProgress>5&&shavingProgress<98){ctx.fillStyle='#5b3a29';for(let i=0;i<12;i++){
    ctx.fillRect(fx+20+((frameCount*3+i*37)%70),fy+80+((frameCount*2+i*23)%100),2,6+Math.sin(i)*3);}}
  ctx.fillStyle='#333';ctx.fillRect(cx-120,H-80,240,20);ctx.fillStyle='#d946ef';ctx.fillRect(cx-118,H-78,236*Math.min(1,shavingProgress/100),16);
  ctx.fillStyle='#e8d5f5';ctx.font='14px monospace';ctx.fillText(`Бритьё: ${Math.min(100,Math.floor(shavingProgress))}%`,cx,H-50);
  if(shavingPhase>=3){ctx.fillStyle='#ffd700';ctx.font='bold 20px monospace';ctx.fillText('ГЛАДКО! ПОЛНАЯ ПОБЕДА!',cx,H-110);
    ctx.fillStyle='#e8d5f5';ctx.font='14px monospace';ctx.fillText(`Финальный счёт: ${score}`,cx,H-25);
    if(Math.sin(frameCount*0.1)>0)ctx.fillText('Нажми ENTER',cx,H-5);
    ctx.fillStyle='#ffd700';for(let i=0;i<8;i++){const a=frameCount*0.03+i*Math.PI/4,d=70+Math.sin(frameCount*0.05+i)*15;
      const sx=cx+Math.cos(a)*d,sy=cy+Math.sin(a)*d,ss=3+Math.sin(frameCount*0.1+i*2)*2;
      ctx.fillRect(sx-ss/2,sy-1,ss,2);ctx.fillRect(sx-1,sy-ss/2,2,ss);}}
  ctx.textAlign='left';
}

function draw() {
  ctx.clearRect(0,0,W,H);

  // Level transition screen
  if (levelTransition > 0) {
    ctx.fillStyle = '#1a0a2e'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#d4a0ff'; ctx.font = 'bold 28px monospace'; ctx.textAlign = 'center';
    ctx.fillText(THEMES[levelTransitionTarget].name, W/2, H/2 - 20);
    ctx.fillStyle = '#e8d5f5'; ctx.font = '16px monospace';
    const dots = '.'.repeat(Math.floor(frameCount / 10) % 4);
    ctx.fillText('Загрузка' + dots, W/2, H/2 + 30);
    ctx.textAlign = 'left';
    frameCount++;
    return;
  }

  if (gameWon && shavingPhase >= 2) { drawShavingCutscene(); return; }

  drawBackground();
  const sT=Math.floor(cameraX/TILE)-1, eT=sT+Math.ceil(W/TILE)+2;
  for(let ty=0;ty<LEVEL_HEIGHT;ty++)for(let tx=sT;tx<=eT;tx++)if(tx>=0&&tx<LEVEL_WIDTH)drawTile(tx,ty);
  for(const m of mushrooms){if(!m.alive||m.x-cameraX<-TILE||m.x-cameraX>W+TILE)continue;drawMushroom(m);}
  for(const e of enemies){if(!e.alive||e.x-cameraX<-TILE||e.x-cameraX>W+TILE)continue;
    if(e.type==='goomba')drawGoomba(e);else drawKoopa(e);}
  if(!player.dead) drawPixelChar(player.x,player.y,player.facing);
  drawParticles();

  if(gameOver){ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#d946ef';ctx.font='bold 36px monospace';
    ctx.textAlign='center';ctx.fillText('ИГРА ОКОНЧЕНА',W/2,H/2-20);ctx.fillStyle='#e8d5f5';ctx.font='16px monospace';
    ctx.fillText('Нажми ENTER для перезапуска',W/2,H/2+30);ctx.textAlign='left';}
  if(gameWon&&shavingPhase<2&&shavingPhase>=0){ctx.fillStyle='rgba(26,10,46,0.5)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ffd700';ctx.font='bold 28px monospace';ctx.textAlign='center';
    ctx.fillText(currentLevel<3?'УРОВЕНЬ ПРОЙДЕН!':'ФИНАЛЬНЫЙ УРОВЕНЬ ПРОЙДЕН!',W/2,H/2);ctx.textAlign='left';}
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

startLevel(1);
generateBG();
gameLoop();
</script>
